# -------------------------------------------------------------------
# SEC RAG Pipeline - local Docker stack
#
# Infra only:
#   docker compose up -d postgres qdrant
#
# Full stack:
#   docker compose --profile full up --build -d
# -------------------------------------------------------------------

services:
  # PostgreSQL 16 with pgvector extension for chunk storage.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sec_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sec_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sec_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant vector store used by the retrieval phase.
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: sec_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Local Ollama runtime for offline LLM fallback.
  ollama:
    image: ollama/ollama:latest
    container_name: sec_ollama
    profiles: ["full"]
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        ollama serve &
        OLLAMA_PID=$$!;
        until curl -fsS http://localhost:11434/api/tags >/dev/null 2>&1; do sleep 2; done;
        ollama pull "$${OLLAMA_MODEL}";
        wait $$OLLAMA_PID
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/tags >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # FastAPI app container for health checks and future query endpoints.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sec_app
    profiles: ["full"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: docker
      DB_URL: postgresql+asyncpg://postgres:password@postgres:5432/sec_rag
      QDRANT_URL: http://qdrant:6333
      EDGAR_USER_AGENT: ${EDGAR_USER_AGENT:-Dev User dev@example.com}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-Dev User dev@example.com}
      EDGAR_DOWNLOAD_DIR: /app/data/raw
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-dummy}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://sec_ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./fixtures:/app/fixtures
      - ./output:/app/output
    working_dir: /app
    command: ["poetry", "run", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
